# Netplan Configuration for Static IP
# File: /etc/netplan/00-installer-config.yaml

network:
  version: 2
  renderer: networkd
  ethernets:
    enp0s3:
      dhcp4: false
      addresses:
        - 10.1.18.50/16  # replace the ip with the correct submask of the host machine
      routes:
        - to: default
          via: 10.1.0.1
      nameservers:
        addresses:
          - 8.8.8.8
          - 1.1.1.1