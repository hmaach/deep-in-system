# vsftpd Configuration File
# File: /etc/vsftpd.conf
#
# FTP server configuration for deep-in-system project
# Security hardened with read-only access for nami user

# ============================================
# RUN MODE
# ============================================

# Run standalone
listen=YES

# IPv6
listen_ipv6=NO

# ============================================
# ANONYMOUS CONFIGURATION
# ============================================

# Disable anonymous login (REQUIRED for security)
anonymous_enable=NO

# Allow anonymous upload (should be NO)
anon_upload_enable=NO

# Allow anonymous mkdir (should be NO)
anon_mkdir_write_enable=NO

# ============================================
# LOCAL USER CONFIGURATION
# ============================================

# Enable local user login
local_enable=YES

# Write permission (enables upload)
write_enable=YES

# Default umask for local users
local_umask=022

# ============================================
# CHROOT JAIL CONFIGURATION
# ============================================

# Chroot local users to their home directory
chroot_local_user=YES

# Allow writing within chroot
allow_writeable_chroot=YES

# ============================================
# PASV MODE (Required for FTP through firewall)
# ============================================

# Enable passive mode
pasv_enable=YES

# Passive port range (for firewall configuration)
pasv_min_port=40000
pasv_max_port=40100

# Passive address (use server IP if needed)
# pasv_address=YOUR_SERVER_IP

# ============================================
# SECURITY SETTINGS
# ==========================================

# Deny files starting with dot
deny_file_enable=YES

# Hide hidden files
hide_file_enable=YES

# Hide this file
hide_ids=YES

# Maximum connections
max_clients=10

# Maximum connections per IP
max_per_ip=5

# Connection timeout (seconds)
idle_session_timeout=600

# Data connection timeout
data_connection_timeout=300

# ============================================
# ASCII CONFIGURATION
# ============================================

# Enable ASCII mode
ascii_enable=YES

# Allow ASCII upload
ascii_upload_enable=YES

# Allow ASCII download
ascii_download_enable=YES

# ============================================
# LOGGING
# ============================================

# Enable logging
xferlog_enable=YES

# Log file location
xferlog_file=/var/log/vsftpd.log

# Use standard ftpd xferlog format
xferlog_std_format=YES

# Log in vsftpd log file
log_ftp_protocol=YES

# ============================================
# Banner Settings
# ============================================

# Display login banner
banner_file=/etc/vsftpd/banner

# ============================================
# DIRECTORY SETTINGS
# ============================================

# User config directory
user_config_dir=/etc/vsftpd/user_conf

# ============================================
# SSL/TLS (Optional - for secure FTP)
# ============================================

# Uncomment for SSL (requires openssl)
# ssl_enable=YES
# allow_anon_ssl=NO
# force_local_data_ssl=YES
# force_local_logins_ssl=YES
# ssl_tlsv1=YES
# ssl_sslv3=YES
# rsa_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
# rsa_private_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
