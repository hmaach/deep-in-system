# Docker Compose Configuration
# File: docker/docker-compose.yml
#
# Docker Compose file for the deep-in-system project services.
# This file defines all services needed for the complete project.

version: '3.8'

services:
  # ============================================
  # MySQL Database
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: deep-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: StrongPassword123!
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # WordPress
  # ============================================
  wordpress:
    image: wordpress:latest
    container_name: deep-wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: StrongPassword123!
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # ============================================
  # FTP Server
  # ============================================
  ftp:
    image: fauria/vsftpd
    container_name: deep-ftp
    restart: unless-stopped
    environment:
      FTP_USER: nami
      FTP_PASS: nami_password123
      PASV_ADDRESS: 192.168.1.100
      PASV_MIN_PORT: 40000
      PASV_MAX_PORT: 40100
    volumes:
      - /backup:/home/vsftpd
    ports:
      - "21:21"
      - "40000-40100:40000-40100"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  wordpress_data:
